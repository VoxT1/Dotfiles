# My Alacritty configuration.
#
## FONT ##
font:
  size: 12
  normal:
    # family: Terminus 
    # family: dina
    # family: Hack
    # family: Monofur
    family: Mononoki
    # family: joypixels
    # family: fira code
    # family: anonymous pro

## OPACITY ##
background_opacity: 0.75

## CURSOR ##
cursor:
  style:
    shape: Beam
    blinking: Always

## PADDING ##
window:
  padding:
     x: 30 
     y: 30

## THEME ##
#import:
 # - /home/voxol/.config/alacritty/dark.yml
 # - /home/voxol/.config/alacritty/dracula.yml
 # - /home/voxol/.config/alacritty/doom-one.yml
 # - /home/voxol/.config/alacritty/gruvbox.yml

# Doom One
colors:
  primary:
    background: '0x282C34'
    foreground: '0xbbc2cf'
  cursor:
    text: CellBackground
    cursor: CellForeground
  vi_mode_cursor:
    text: CellBackground
    cursor: CellForeground
  search:
    matches:
      foreground: '0x44475a'
      background: '0x50fa7b'
    focused_match:
      foreground: '0x44475a'
      background: '0xffb86c'
    bar:
      background: '0x282a36'
      foreground: '0xf8f8f2'
  line_indicator:
    foreground: None
    background: None
  selection:
    text: CellForeground
    background: '0x282C34'
  normal:
    black:   '0x000000'
    red:     '0xff6c6b'
    green:   '0x98be65'
    yellow:  '0xECBE7B'
    blue:    '0x2257A0'
    magenta: '0xa9a1e1'
    cyan:    '0x5699AF'
    white:   '0xDFDFDF'
  bright:
    black:   '0x000000'
    red:     '0xff6c6b'
    green:   '0x98be65'
    yellow:  '0xECBE7B'
    blue:    '0x2257A0'
    magenta: '0xa9a1e1'
    cyan:    '0x5699AF'
    white:   '0xDFDFDF'

 
## ZOOM ##
key_bindings:
  - { key: Period,      mods: Control,       action: IncreaseFontSize            }
  - { key: Comma,     mods: Control,       action: DecreaseFontSize            }
      
